# Protector — sensitive-table data policy
# Format: block|mask <table> [<col>:<kind> ...]
# Mask kinds: redact | email | phone | partial:<n>
#
# block — deny the query entirely; agent gets DATA_POLICY_BLOCK error.
# mask  — let the query run but replace sensitive column values;
#         agent receives the result with masked data.
#
# Loaded from (first found):
#   $PROTECTOR_POLICY
#   /etc/protector/policy.conf
#   ./policy.conf

# Payment data — always block, no masked fallback
block payment_cards
block credit_scores

# User PII — allow masked reads so the agent can still work with the table
mask users         email:email   phone:phone   ssn:redact          password_hash:redact
mask customers     email:email   date_of_birth:redact  card_number:redact
mask employees     salary:redact national_id:redact    personal_email:email

# Auth tokens — block entirely
block api_keys
block oauth_tokens
block sessions

# ── Filesystem protection ─────────────────────────────────────────────────────
# fblock — deny read/copy/move entirely
# fmask  — allow command but mask secrets in its output

# System auth / shadow — hard block
fblock /etc/shadow
fblock /etc/sudoers
fblock /etc/sudoers.d/

# SSH private keys
fblock ~/.ssh/id_rsa
fblock ~/.ssh/id_ed25519
fblock ~/.ssh/id_ecdsa
fblock ~/.ssh/id_*

# Cloud credentials — mask (agent can work with the file structure, not the values)
fmask  ~/.aws/credentials
fmask  ~/.aws/config
fmask  ~/.config/gcloud/

# Container / k8s credentials
fmask  ~/.kube/config
fmask  ~/.docker/config.json

# Application secrets — mask
fmask  .env
fmask  .env.local
fmask  .env.production
fmask  **/.env
fmask  **/secrets.yaml
fmask  **/secrets.yml

# Logs that may contain PII — mask
fmask  /var/log/auth.log
fmask  /var/log/syslog
